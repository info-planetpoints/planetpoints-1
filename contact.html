<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlanetPoints — Contact</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="logo.png" type="image/png">
  <link rel="icon" href="logo.svg" type="image/svg+xml">
</head>
<body>
  <header class="header">
    <div class="container brand">
      <picture>
        <source srcset="logo.png" type="image/png">
        <img src="logo.svg" alt="PlanetPoints" id="logo" />
      </picture>
      <h1>PlanetPoints</h1>
    </div>
    <nav class="nav">
      <ul>
        <li><a href="home.html">Home</a></li>
        <li><a href="features.html">Features</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main class="section">
    <div class="container form-container">
      <h2>Kontaktiraj nas</h2>
      <form>
        <input type="text" name="name" placeholder="Ime i prezime" required>
        <input type="email" name="email" placeholder="Email" required>
        <textarea name="message" rows="5" placeholder="Poruka" required></textarea>
        <button type="submit" class="btn btn-primary">Pošalji</button>
      </form>
      <p style="margin-top:10px; font-size: 0.9rem;">Slanjem obrasca pristaješ na obradu podataka u svrhu odgovora.</p>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 PlanetPoints.</p>
    </div>
  </footer>
</body>
</html>
